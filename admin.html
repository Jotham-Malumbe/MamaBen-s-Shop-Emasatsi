<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MamaBen's Shop Emasatsi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-gray-900 dark:text-gray-100 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- LOGIN SCREEN -->
        <div id="login-screen" class="max-w-md mx-auto bg-white dark:bg-slate-900 rounded-3xl shadow-xl p-10">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-emerald-600">Admin Dashboard</h1>
                <p class="text-gray-500 mt-2">MamaBen's Shop - Emasatsi</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="admin-password" 
                           placeholder="Enter admin password"
                           class="w-full px-5 py-4 border border-gray-300 dark:border-slate-700 rounded-2xl focus:outline-none focus:border-emerald-500 bg-transparent">
                </div>
                
                <button onclick="loginAdmin()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl transition-all">
                    Login to Dashboard
                </button>
                
                <p class="text-center text-xs text-gray-500">
                    Default password: <span class="font-mono bg-gray-100 dark:bg-slate-800 px-2 py-1 rounded">admin123</span><br>
                    Change it in script.js for security
                </p>
            </div>
        </div>

        <!-- ADMIN DASHBOARD (Hidden initially) -->
        <div id="admin-dashboard" class="hidden">
            
            <!-- Header -->
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-4xl font-bold">Admin Dashboard</h1>
                    <p class="text-gray-500">Manage Products • MamaBen's Shop Emasatsi</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="logoutAdmin()" 
                            class="px-6 py-3 border border-red-500 text-red-500 hover:bg-red-50 dark:hover:bg-red-950 rounded-2xl font-medium">
                        Logout
                    </button>
                </div>
            </div>

            <!-- Add New Product Form -->
            <div class="bg-white dark:bg-slate-900 rounded-3xl p-8 mb-10 shadow-sm">
                <h2 class="text-2xl font-semibold mb-6">Add New Product</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Product Name</label>
                        <input type="text" id="new-name" class="w-full px-5 py-3 border border-gray-300 dark:border-slate-700 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Price (KSh)</label>
                        <input type="number" id="new-price" class="w-full px-5 py-3 border border-gray-300 dark:border-slate-700 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Category</label>
                        <input type="text" id="new-category" placeholder="e.g. Dairy, Groceries, Staples" 
                               class="w-full px-5 py-3 border border-gray-300 dark:border-slate-700 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Image URL</label>
                        <input type="text" id="new-image" placeholder="https://i.imgur.com/..." 
                               class="w-full px-5 py-3 border border-gray-300 dark:border-slate-700 rounded-2xl">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-2">Description</label>
                        <textarea id="new-description" rows="3" 
                                  class="w-full px-5 py-3 border border-gray-300 dark:border-slate-700 rounded-2xl"></textarea>
                    </div>
                </div>
                <button onclick="addNewProduct()" 
                        class="mt-6 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-10 py-4 rounded-2xl">
                    Add Product
                </button>
            </div>

            <!-- Products List -->
            <div class="bg-white dark:bg-slate-900 rounded-3xl p-8 shadow-sm">
                <h2 class="text-2xl font-semibold mb-6">All Products</h2>
                <div id="admin-products-list" class="space-y-4">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Product Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-slate-900 w-full max-w-lg mx-4 rounded-3xl p-8">
            <h3 class="text-2xl font-bold mb-6">Edit Product</h3>
            
            <input type="hidden" id="edit-id">
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium mb-1">Name</label>
                    <input type="text" id="edit-name" class="w-full px-4 py-3 border rounded-2xl">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Price</label>
                        <input type="number" id="edit-price" class="w-full px-4 py-3 border rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Category</label>
                        <input type="text" id="edit-category" class="w-full px-4 py-3 border rounded-2xl">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Image URL</label>
                    <input type="text" id="edit-image" class="w-full px-4 py-3 border rounded-2xl">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Description</label>
                    <textarea id="edit-description" rows="3" class="w-full px-4 py-3 border rounded-2xl"></textarea>
                </div>
            </div>

            <div class="flex gap-4 mt-8">
                <button onclick="saveEditedProduct()" 
                        class="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-semibold">
                    Save Changes
                </button>
                <button onclick="closeEditModal()" 
                        class="flex-1 border border-gray-400 py-4 rounded-2xl font-semibold">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
