<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product details at MamaBen's Shop Emasatsi. Fresh daily essentials with fast WhatsApp ordering and delivery.">
    <title id="product-title">Product - MamaBen's Shop Emasatsi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-gray-900 dark:text-gray-100 min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-white dark:bg-slate-900 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <img src="images/logo.png" alt="MamaBen's Shop Logo" class="h-10 w-10 rounded-full">
                    <div>
                        <h1 class="font-bold text-xl text-emerald-600">MamaBen's Shop</h1>
                        <p class="text-xs text-gray-500 dark:text-gray-400 -mt-1">Emasatsi</p>
                    </div>
                </div>

                <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                    <a href="index.html" class="hover:text-emerald-600 transition-colors">Home</a>
                    <a href="products.html" class="hover:text-emerald-600 transition-colors">Products</a>
                    <a href="about.html" class="hover:text-emerald-600 transition-colors">About</a>
                    <a href="contact.html" class="hover:text-emerald-600 transition-colors">Contact</a>
                </div>

                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800">
                        🌙
                    </button>
                    <div onclick="toggleCart()" class="relative cursor-pointer">
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                        <span class="text-2xl">🛒</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-10">
        <div class="flex flex-col lg:flex-row gap-10">
            
            <!-- LEFT: Product Image -->
            <div class="lg:w-1/2">
                <div class="bg-white dark:bg-slate-900 rounded-3xl overflow-hidden shadow-lg">
                    <img id="product-image" 
                         src="" 
                         alt="" 
                         class="w-full h-auto object-cover">
                </div>
            </div>

            <!-- RIGHT: Product Details -->
            <div class="lg:w-1/2 space-y-6">
                <div>
                    <span id="product-category" class="inline-block px-4 py-1 bg-emerald-100 dark:bg-emerald-900 text-emerald-700 dark:text-emerald-300 text-sm font-medium rounded-full"></span>
                </div>
                
                <h1 id="product-name" class="text-4xl font-bold leading-tight"></h1>
                
                <div class="flex items-center gap-4">
                    <span id="product-price" class="text-4xl font-bold text-emerald-600"></span>
                    <span class="text-gray-500">per unit</span>
                </div>

                <div id="product-description" class="text-gray-600 dark:text-gray-400 leading-relaxed text-lg"></div>

                <!-- Quantity Selector -->
                <div class="flex items-center gap-4">
                    <span class="font-medium">Quantity:</span>
                    <div class="flex items-center border border-gray-300 dark:border-slate-700 rounded-2xl">
                        <button onclick="changeQuantity(-1)" class="w-12 h-12 flex items-center justify-center text-2xl hover:bg-gray-100 dark:hover:bg-slate-800 rounded-l-2xl">-</button>
                        <span id="quantity" class="w-16 text-center font-semibold text-xl">1</span>
                        <button onclick="changeQuantity(1)" class="w-12 h-12 flex items-center justify-center text-2xl hover:bg-gray-100 dark:hover:bg-slate-800 rounded-r-2xl">+</button>
                    </div>
                </div>

                <!-- Add to Cart Button -->
                <button onclick="addCurrentProductToCart()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl text-lg transition-all flex items-center justify-center gap-3">
                    <span>Add to Cart</span>
                    <span class="text-xl">🛒</span>
                </button>

                <!-- Delivery Information -->
                <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-gray-200 dark:border-slate-700">
                    <h3 class="font-semibold mb-4 flex items-center gap-2">
                        🚚 Delivery Information
                    </h3>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between">
                            <span class="text-gray-600 dark:text-gray-400">Option:</span>
                            <select id="delivery-option-single" onchange="updateSingleDeliveryFee()" class="border border-gray-300 dark:border-slate-700 rounded-lg px-3 py-1">
                                <option value="pickup">Pickup from Shop (Free)</option>
                                <option value="delivery">Delivery</option>
                            </select>
                        </div>
                        <div id="location-row-single" class="hidden flex justify-between items-center">
                            <span class="text-gray-600 dark:text-gray-400">Location:</span>
                            <select id="delivery-location-single" onchange="updateSingleDeliveryFee()" class="border border-gray-300 dark:border-slate-700 rounded-lg px-3 py-1">
                                <!-- Populated by JS -->
                            </select>
                        </div>
                        <div class="flex justify-between font-medium">
                            <span>Delivery Fee:</span>
                            <span id="delivery-fee-single" class="text-emerald-600">KSh 0</span>
                        </div>
                    </div>
                </div>

                <!-- Related Products -->
                <div>
                    <h3 class="font-semibold mb-4">Related Products</h3>
                    <div id="related-products" class="grid grid-cols-2 gap-4">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CART MODAL (Same as products.html) -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-slate-900 w-full max-w-lg mx-4 rounded-3xl max-h-[90vh] overflow-hidden">
            <div class="p-6 border-b dark:border-slate-700 flex justify-between items-center">
                <h2 class="text-2xl font-bold">Your Cart</h2>
                <button onclick="toggleCart()" class="text-3xl leading-none">×</button>
            </div>
            
            <div id="cart-items" class="p-6 overflow-auto max-h-[60vh]">
                <!-- Cart items added by JS -->
            </div>

            <div class="p-6 border-t dark:border-slate-700">
                <div class="space-y-3 mb-6">
                    <div class="flex justify-between">
                        <span>Subtotal</span>
                        <span id="subtotal" class="font-semibold">KSh 0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span>Delivery Option</span>
                        <select id="delivery-option" onchange="updateDeliveryFee()" class="border border-gray-300 dark:border-slate-700 rounded-lg px-3 py-1 bg-transparent">
                            <option value="pickup">Pickup (Free)</option>
                            <option value="delivery">Delivery</option>
                        </select>
                    </div>
                    <div id="location-row" class="hidden flex justify-between items-center">
                        <span>Delivery Location</span>
                        <select id="delivery-location" onchange="updateDeliveryFee()" class="border border-gray-300 dark:border-slate-700 rounded-lg px-3 py-1 bg-transparent">
                            <!-- Populated by JS -->
                        </select>
                    </div>
                    <div class="flex justify-between font-semibold text-lg border-t dark:border-slate-700 pt-3">
                        <span>Total</span>
                        <span id="grand-total" class="text-emerald-600">KSh 0</span>
                    </div>
                </div>

                <button onclick="placeOrder()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl text-lg transition-all">
                    Order via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
